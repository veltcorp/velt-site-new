backend:
  name: github
  repo: veltcorp/velt-site-new
  branch: main
  base_url: https://www.veltcorp.com.br
  auth_endpoint: api/auth

media_folder: assets/blog
public_folder: /assets/blog

collections:
  - name: blog
    label: Blog
    folder: blog/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - { label: "Título", name: title, widget: string }
      - { label: "Slug", name: slug, widget: string, hint: "Nome do arquivo sem .md (ex: meu-artigo)" }
      - { label: "Data", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Autor", name: author, widget: string, default: "Velt Corp" }
      - { label: "Meta Descrição", name: description, widget: text }
      - label: Pilar
        name: pillar
        widget: select
        options:
          - Viagens Corporativas
          - Redução de Custos
          - Financeiro
          - Operação
          - Tecnologia
          - Gestão de Milhas
          - Experiência do Viajante
      - { label: "Imagem de capa", name: image, widget: image, required: false }
      - { label: "Tags", name: tags, widget: list, default: [] }
      - { label: "Conteúdo", name: body, widget: markdown }
