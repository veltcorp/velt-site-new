<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Blog Velt</title>
    <meta name="description" content="{{description}}">

    <!-- Open Graph / SEO -->
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="{{image}}">
    <meta property="og:type" content="article">
    <meta property="article:published_time" content="{{date}}">
    <meta property="article:author" content="{{author}}">

    <!-- Performance: preconnect to external origins before loading resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Tailwind (pinned version for cache stability) -->
    <script src="https://cdn.tailwindcss.com/3.4.16?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#1E293B',
                        surface: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    typography: {
                        DEFAULT: {
                            css: {
                                maxWidth: '100%', // Allow full width inside container
                                color: '#334155',
                                h1: { color: '#1E293B', fontWeight: '800' },
                                h2: { color: '#1E293B', marginTop: '2em', marginBottom: '0.8em', lineHeight: '1.3' },
                                h3: { color: '#334155', marginTop: '1.5em', marginBottom: '0.6em' },
                                strong: { color: '#0F172A', fontWeight: '700' },
                                a: { color: '#FF6B00', textDecoration: 'none', '&:hover': { textDecoration: 'underline' } },
                                blockquote: { borderLeftColor: '#FF6B00', fontStyle: 'italic', color: '#475569', backgroundColor: '#F1F5F9', padding: '1rem', borderRadius: '0.5rem' },
                                code: { color: '#e83e8c', backgroundColor: '#f1f5f9', padding: '0.2em 0.4em', borderRadius: '0.25rem', fontWeight: '500' },
                                'code::before': { content: '""' },
                                'code::after': { content: '""' },
                            },
                        },
                    },
                }
            }
        }
    </script>
    <style>
        /* Smooth scrolling for TOC links */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar for TOC */
        .toc-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .toc-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .toc-scroll::-webkit-scrollbar-thumb {
            background-color: #CBD5E1;
            border-radius: 20px;
        }

        /* Progress bar */
        #reading-progress {
            transition: width 0.1s;
        }
    </style>
</head>

<body class="antialiased bg-surface text-slate-800">

    <!-- Reading Progress Bar -->
    <div class="fixed top-0 left-0 w-full h-1 z-50 bg-gray-200">
        <div id="reading-progress" class="h-full bg-primary w-0"></div>
    </div>

    <!-- Header injected by JS -->
    <div id="main-header"></div>

    <!-- Breadcrumb (Optional but good for SEO/UX) -->
    <nav class="container mx-auto px-4 py-4 text-sm text-slate-500">
        <a href="/" class="hover:text-primary">Home</a> <span class="mx-2">/</span>
        <a href="/blog.html" class="hover:text-primary">Blog</a> <span class="mx-2">/</span>
        <span class="text-slate-800 font-medium truncate">{{title}}</span>
    </nav>

    <!-- Article Hero -->
    <header class="relative pt-20 pb-24 md:pt-32 md:pb-32 bg-secondary text-white overflow-hidden rounded-b-[3rem]">
        <div class="absolute inset-0 opacity-30 bg-[url('{{image}}')] bg-cover bg-center mix-blend-overlay"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-secondary via-secondary/90 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-secondary to-transparent"></div>

        <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
            <div class="flex flex-wrap justify-center gap-4 text-sm font-bold uppercase tracking-wider mb-6">
                <span class="px-3 py-1 bg-primary text-white rounded-full">{{date}}</span>
                <span
                    class="px-3 py-1 bg-white/10 border border-white/20 text-white rounded-full backdrop-blur-md flex items-center gap-2">
                    <span class="material-icons text-sm">schedule</span> {{reading_time}}
                </span>
            </div>

            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold leading-tight mb-8 drop-shadow-lg text-balance">
                {{title}}</h1>

            <div class="flex items-center justify-center gap-3 text-slate-300">
                <span class="material-icons text-primary">person</span>
                <span class="text-lg font-medium">{{author}}</span>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-12 flex flex-col lg:flex-row gap-12 relative">

        <!-- Table of Contents (Desktop Sticky) -->
        <aside class="hidden lg:block w-1/4 relative">
            <div class="sticky top-32 max-h-[calc(100vh-10rem)] overflow-y-auto toc-scroll pr-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Neste artigo</h3>
                <nav id="toc-desktop" class="space-y-1 border-l border-slate-200"></nav>
            </div>
        </aside>

        <!-- Content -->
        <main class="w-full lg:w-3/4 max-w-3xl mx-auto">

            <!-- Mobile TOC (Collapsible) -->
            <div class="lg:hidden mb-8 bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <details class="group">
                    <summary
                        class="flex justify-between items-center p-4 cursor-pointer list-none font-bold text-slate-800">
                        <span>Índice do Conteúdo</span>
                        <span
                            class="material-icons transform group-open:rotate-180 transition-transform text-slate-400">expand_more</span>
                    </summary>
                    <div id="toc-mobile" class="px-4 pb-4 pt-0 border-t border-slate-100 bg-slate-50/50">
                        <!-- JS injected content -->
                    </div>
                </details>
            </div>

            <article class="prose prose-lg prose-slate prose-headings:scroll-mt-32 max-w-none">
                <p class="lead text-xl text-slate-600 mb-8 font-medium border-l-4 border-primary pl-4 italic">
                    {{description}}
                </p>
                {{content}}
            </article>

            <!-- Share / Footer of Article -->
            <div class="mt-16 pt-8 border-t border-slate-200">
                <h3 class="text-xl font-bold mb-4">Gostou deste artigo?</h3>
                <div class="flex gap-4">
                    <!-- Simple share links placeholder -->
                    <button
                        class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                        onclick="alert('Funcionalidade de compartilhar em breve!')">
                        <span class="material-icons text-sm">share</span> Compartilhar
                    </button>
                    <a href="/blog.html"
                        class="flex items-center gap-2 px-4 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 transition text-slate-600">
                        <span class="material-icons text-sm">arrow_back</span> Voltar ao Blog
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Script to Generate TOC and Progress Bar -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply Highlight.js
            hljs.highlightAll();

            const article = document.querySelector('article');
            const headings = article.querySelectorAll('h2, h3');
            const tocDesktop = document.getElementById('toc-desktop');
            const tocMobile = document.getElementById('toc-mobile');

            if (headings.length === 0) {
                document.querySelector('aside').style.display = 'none';
                document.querySelector('details').style.display = 'none';
            }

            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;

                // Create link
                const link = document.createElement('a');
                link.href = `#${id}`;
                link.className = heading.tagName === 'H2'
                    ? 'block py-1 pl-4 border-l-2 border-transparent hover:border-primary hover:text-primary text-slate-600 text-sm transition-colors duration-200'
                    : 'block py-1 pl-8 border-l-2 border-transparent hover:border-primary hover:text-primary text-slate-500 text-xs transition-colors duration-200';
                link.textContent = heading.textContent;

                // Clone for mobile
                const linkMobile = link.cloneNode(true);
                linkMobile.className = heading.tagName === 'H2'
                    ? 'block py-2 text-slate-700 font-medium hover:text-primary border-b border-dashed border-slate-200 last:border-0'
                    : 'block py-2 pl-4 text-slate-500 text-sm hover:text-primary border-b border-dashed border-slate-200 last:border-0';

                tocDesktop.appendChild(link);
                tocMobile.appendChild(linkMobile);
            });

            // Scroll Spy for TOC
            const observerOptions = {
                root: null,
                rootMargin: '-100px 0px -60% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const id = entry.target.id;
                    const tocLink = document.querySelector(`#toc-desktop a[href="#${id}"]`);

                    if (entry.isIntersecting) {
                        // Remove active class from all
                        document.querySelectorAll('#toc-desktop a').forEach(a => {
                            a.classList.remove('border-primary', 'text-primary', 'font-medium');
                            a.classList.add('border-transparent');
                        });

                        // Add active class to current
                        if (tocLink) {
                            tocLink.classList.remove('border-transparent');
                            tocLink.classList.add('border-primary', 'text-primary', 'font-medium');
                        }
                    }
                });
            }, observerOptions);

            headings.forEach(h => observer.observe(h));

            // Reading Progress Bar
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.body.scrollHeight - window.innerHeight;
                const scrollPercent = scrollTop / docHeight;
                const progress = Math.min(100, Math.max(0, scrollPercent * 100));

                document.getElementById('reading-progress').style.width = `${progress}%`;
            });
        });
    </script>


    <!-- Footer injected by JS -->
    <div id="main-footer"></div>

    <!-- Layout Script (Root Relative) -->
    <script src="../js/layout.js?v=3"></script>

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "{{title}}",
      "image": "{{image}}",
      "author": {
        "@type": "Person",
        "name": "{{author}}"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Velt",
        "logo": {
          "@type": "ImageObject",
          "url": "https://velt.com.br/assets/logoVelt.png"
        }
      },
      "datePublished": "{{date}}",
      "description": "{{description}}"
    }
    </script>
</body>

</html>
